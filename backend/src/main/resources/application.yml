server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/stocklookup;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-123456}
    expiry-minutes: 120
  finnhub:
    base-url: https://finnhub.io/api/v1
    api-key: ${FINNHUB_API_KEY:demo}
